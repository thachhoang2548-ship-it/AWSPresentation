<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging System - Pitch Deck</title>
    <!-- Use Inter font for clean, modern business look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="presentation-container" id="presentation">

                <!-- ================= SLIDE 1 ================= -->
        <section class="slide theme-dark" id="slide-1">
            <header class="slide-header" style="display: flex; justify-content: space-between;">
                <div class="header-left" style="display: flex; align-items: center; gap: 1.5rem;">
                    <div class="partner-logo">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/1/11/FPT_logo_2010.svg" alt="FPT University">
                    </div>
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                        <span>EV SYSTEM PITCH DECK</span>
                    </div>
                </div>
                
                <div class="header-right" style="display: flex; align-items: center; gap: 1.5rem;">
                    <nav class="top-nav">
                        <a href="#slide-1" class="pill active">Home</a>
                        <a href="#slide-2" class="pill">Team</a>
                        <a href="#slide-3" class="pill">Architecture</a>
                        <a href="#slide-13" class="pill">Contact</a>
                        <div class="hamburger"><span></span><span></span><span></span></div>
                    </nav>
                    <div class="partner-logo pt-aws">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg" alt="AWS">
                    </div>
                </div>
            </header>

            <div class="decor-circle circle-1"></div>
            <div class="decor-circle circle-2"></div>
            <div class="decor-grid"></div>

            <div class="content cover-layout">
                <h1 class="giant-text">EV CHARGING<br>SYSTEM</h1>
                <h2 class="sub-giant-text">AWS ARCHITECTURE PRESENTATION</h2>
            </div>

            <footer class="slide-footer">
                <div class="website-link"><span class="dot"></span> www.ev-system.com</div>
                <div class="page-pill">Page 01</div>
            </footer>
        </section>

    </div>
    <script src="script.js"></script>
</body>
</html>
