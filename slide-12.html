<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging System - Pitch Deck</title>
    <!-- Use Inter font for clean, modern business look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="presentation-container" id="presentation">

                <!-- ================= SLIDE 12 ================= -->
        <section class="slide theme-dark" id="slide-12">
            <header class="slide-header" style="display: flex; justify-content: space-between;">
                <div class="header-left" style="display: flex; align-items: center; gap: 1.5rem;">
                    <div class="partner-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/1/11/FPT_logo_2010.svg" alt="FPT University"></div>
                    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg><span>EV SYSTEM PITCH DECK</span></div>
                </div>
                <div class="header-right" style="display: flex; align-items: center; gap: 1.5rem;">
                    <div class="partner-logo pt-aws"><img src="https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg" alt="AWS"></div>
                </div>
            </header>

            <div class="decor-circle circle-1"></div>
            <div class="decor-circle circle-2" style="bottom: -200px; right: -200px; top:auto; left:auto;"></div>
            
            <div class="content cover-layout">
                <h2 class="sub-giant-text" style="color: #6C8BAA;">THAO TÁC THÀNH CÔNG</h2>
                <h1 class="giant-text">READY FOR<br>PRODUCTION</h1>
                <p class="desc-text mt-3" style="color: #fff; max-width: 600px; margin-left: auto; margin-right: auto;">
                    Hệ thống đã đạt đỉnh về Scalability, Security, Monitoring và High Availability. Xin cảm ơn ban giám khảo và ĐH FPT.
                </p>
                <div class="mt-4">
                    <a href="javascript:void(0)" class="pill active" style="font-size: 1.1rem; padding: 12px 30px;">Q&A Session</a>
                </div>
            </div>

            <footer class="slide-footer">
                <div class="website-link"><span class="dot"></span> www.ev-system.com</div>
                <div class="page-pill">Page 12</div>
            </footer>
        </section>

    </div>
    <script>
        document.addEventListener('keydown', function(event) {
            let currentPath = window.location.pathname.split('/').pop() || 'index.html';
            let currentIndex = 1;
            if (currentPath.startsWith('slide-')) {
                let match = currentPath.match(/slide-(\d+).html/);
                if (match) currentIndex = parseInt(match[1], 10);
            }

            if (event.key === 'ArrowRight' || event.key === 'ArrowDown' || event.key === 'PageDown') {
                let next = currentIndex + 1;
                if (next <= 12) window.location.href = "slide-" + next + ".html";
            } else if (event.key === 'ArrowLeft' || event.key === 'ArrowUp' || event.key === 'PageUp') {
                let prev = currentIndex - 1;
                if (prev === 1) window.location.href = "index.html";
                else if (prev > 1) window.location.href = "slide-" + prev + ".html";
            }
        });
    </script>
</body>
</html>
