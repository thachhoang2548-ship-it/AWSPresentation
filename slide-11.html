<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging System - Pitch Deck</title>
    <!-- Use Inter font for clean, modern business look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="presentation-container" id="presentation">

                <!-- ================= SLIDE 10 ================= -->
        <section class="slide theme-dark" id="slide-11">
            <header class="slide-header" style="display: flex; justify-content: space-between;">
                <div class="header-left" style="display: flex; align-items: center; gap: 1.5rem;">
                    <div class="partner-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/1/11/FPT_logo_2010.svg" alt="FPT University"></div>
                    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg><span>EV SYSTEM</span></div>
                </div>
                <div class="header-right" style="display: flex; align-items: center; gap: 1.5rem;">
                    <div class="partner-logo pt-aws"><img src="https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg" alt="AWS"></div>
                </div>
            </header>
            
            <div class="content align-center mt-up">
                <h2 class="section-title text-center text-white">END-TO-END SUMMARY</h2>
            </div>
            
            <div class="content card-row-layout mt-4">
                <div class="horizontal-card-list">
                    <div class="row-step"><span>1</span> User -> CloudFront -> S3 (Tải Frontend)</div>
                    <div class="row-step"><span>2</span> Frontend gọi lên API (Route53 -> ALB)</div>
                    <div class="row-step"><span>3</span> ALB Load Balance bắn vào đám EC2 AWS (ASG)</div>
                    <div class="row-step"><span>4</span> EC2 gọi Backend Java xử lý thanh toán (DB + Mail)</div>
                    <div class="row-step highlight"><span>5</span> Server phản hồi nhanh chóng lên màn hình User!</div>
                </div>
            </div>

            <footer class="slide-footer right-only"><div class="page-pill">Page 11</div></footer>
        </section>

    </div>
    <script src="script.js"></script>
</body>
</html>
