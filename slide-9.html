<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging System - Pitch Deck</title>
    <!-- Use Inter font for clean, modern business look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="presentation-container" id="presentation">

                <!-- ================= SLIDE 9 ================= -->
        <section class="slide theme-light" id="slide-9">
            <header class="slide-header" style="display: flex; justify-content: space-between;">
                <div class="header-left" style="display: flex; align-items: center; gap: 1.5rem;">
                    <div class="partner-logo"><img src="https://upload.wikimedia.org/wikipedia/commons/1/11/FPT_logo_2010.svg" alt="FPT University"></div>
                    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg><span>EV SYSTEM</span></div>
                </div>
                <div class="header-right" style="display: flex; align-items: center; gap: 1.5rem;">
                    <div class="partner-logo pt-aws"><img src="https://upload.wikimedia.org/wikipedia/commons/9/93/Amazon_Web_Services_Logo.svg" alt="AWS"></div>
                </div>
            </header>
            <div class="bg-block top-left-dark"></div>
            
            <div class="content split-light-layout">
                <div class="left-pane image-pane">
                    <img src="https://images.unsplash.com/photo-1587614387653-34e405ab1c61?q=80&w=600&auto=format&fit=crop" alt="Email" class="rounded-image shadow-img">
                </div>
                <div class="right-pane text-pane">
                    <h2 class="section-title">EMAIL SERVICE</h2>
                    <h3 class="subtitle-text mt-2">Dùng Amazon SES để thông báo</h3>
                    <p class="desc-text mt-3">Giao tiếp Backend -> SES -> User hòm thư.</p>
                    <p class="desc-text mt-2 text-bold">Tích hợp Route53 Verification</p>
                    <p class="desc-text">Xác minh Domain (TXT, DKIM) để chống vô sọt rác Spam. (Không dùng Root53 để route traffic ở trường hợp này).</p>
                </div>
            </div>
            
            <footer class="slide-footer right-only"><div class="page-pill">Page 09</div></footer>
        </section>

    </div>
    <script>
        document.addEventListener('keydown', function(event) {
            let currentPath = window.location.pathname.split('/').pop() || 'index.html';
            let currentIndex = 1;
            if (currentPath.startsWith('slide-')) {
                let match = currentPath.match(/slide-(\d+).html/);
                if (match) currentIndex = parseInt(match[1], 10);
            }

            if (event.key === 'ArrowRight' || event.key === 'ArrowDown' || event.key === 'PageDown') {
                let next = currentIndex + 1;
                if (next <= 12) window.location.href = "slide-" + next + ".html";
            } else if (event.key === 'ArrowLeft' || event.key === 'ArrowUp' || event.key === 'PageUp') {
                let prev = currentIndex - 1;
                if (prev === 1) window.location.href = "index.html";
                else if (prev > 1) window.location.href = "slide-" + prev + ".html";
            }
        });
    </script>
</body>
</html>
